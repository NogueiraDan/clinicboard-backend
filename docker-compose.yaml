services:
  redis:
    image: redis
    container_name: redis
    restart: on-failure
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    networks:
      - clinicboard

  rabbitmq:
    image: "rabbitmq:management"
    container_name: rabbitmq
    restart: on-failure
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - clinicboard

  service-discovery:
    build:
      context: ./service-discovery
    image: service-discovery
    container_name: service-discovery
    restart: on-failure
    ports:
      - "8761:8761"
    networks:
      - clinicboard

  gateway-service:
    build:
      context: ./gateway
    image: gateway-service
    container_name: gateway-service
    restart: on-failure
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=clinicboard-token-secret-key
    ports:
      - "8080:8080"
    networks:
      - clinicboard
    depends_on:
      - service-discovery
      - redis

  user-service:
    build:
      context: ./user-service
    image: user-service
    container_name: user-service
    restart: on-failure
    environment:
      - JWT_SECRET=clinicboard-token-secret-key
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - DATABASE_URL=jdbc:postgresql://${PGHOST}/${PGDATABASE}?user=${PGUSER}&password=${PGPASSWORD}&sslmode=require
      - DATABASE_USER=${PGUSER}
      - DATABASE_PASSWORD=${PGPASSWORD}
    ports:
      - "8081:8081"
    networks:
      - clinicboard
    depends_on:
      - service-discovery
      - gateway-service

  business-service:
    build:
      context: ./business-service
    image: business-service
    container_name: business-service
    restart: on-failure
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - DATABASE_URL=jdbc:postgresql://${PGHOST}/${PGDATABASE}?user=${PGUSER}&password=${PGPASSWORD}&sslmode=require
      - DATABASE_USER=${PGUSER}
      - DATABASE_PASSWORD=${PGPASSWORD}
      - RABBITMQ_HOST=rabbitmq
    ports:
      - "8082:8082"
    networks:
      - clinicboard
    depends_on:
      - service-discovery
      - rabbitmq
      - gateway-service

  notification-service:
    build:
      context: ./notification-service
    image: notification-service
    container_name: notification-service
    restart: on-failure
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - DATABASE_URL=jdbc:postgresql://${PGHOST}/${PGDATABASE}?user=${PGUSER}&password=${PGPASSWORD}&sslmode=require
      - DATABASE_USER=${PGUSER}
      - DATABASE_PASSWORD=${PGPASSWORD}
      - RABBITMQ_ADDRESS=${RABBITMQ_ADDRESS}
      - RABBITMQ_QUEUE=${RABBITMQ_QUEUE}
      - RABBITMQ_HOST=rabbitmq
    ports:
      - "8083:8083"
    networks:
      - clinicboard
    depends_on:
      - service-discovery
      - rabbitmq
      - gateway-service


networks:
  clinicboard:
    driver: bridge

volumes:
  rabbitmq_data:
  redis_data: